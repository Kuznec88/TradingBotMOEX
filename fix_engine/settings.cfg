SimulationTouchFillProbability=0.12
SimulationPassiveFillProbabilityScale=0.45
SimulationAdverseSelectionBias=0.45
FeesBpsEquities=0.00
FeesBpsForts=0.00
FeesFixedEquities=0.00
FeesFixedForts=0.00
RiskMaxExposurePerInstrument=1000000
RiskMaxTradesInWindow=200
RiskTradesWindowSeconds=60
RiskCooldownAfterConsecutiveLosses=3
RiskCooldownSeconds=30
RiskMaxLossPerTrade=0.0
MaxInventoryPerSymbol=10
MaxInventorySoftPerSymbol=8
MarketMakingEnabled=N
MarketMakingSymbol=SBER
MarketMakingLotSize=1
MarketMakingMarket=EQUITIES
MMVolatilityWindowTicks=20
MMMaxShortTermVolatility=0.0
MMCancelOnHighVolatility=Y
