MMDefensiveQuoteOffsetTicks=1
MMDecisionConfirmationUpdates=2
MMMinDecisionIntervalMs=150
MMDecisionBatchTicks=3
MMCancelImpactHorizonMs=500
MMCancelReasonSummaryEvery=20
# Real MOEX UAT account code for equities (not SenderCompID).
