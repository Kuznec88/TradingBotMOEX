[DEFAULT]
# Common QuickFIX settings.
FileStorePath=store
FileLogPath=log
ConnectionType=initiator
StartTime=00:00:00
EndTime=23:59:59
HeartBtInt=30
UseDataDictionary=Y
DataDictionary=FIX44.xml

# Reconnect behavior: QuickFIX will retry automatically.
ReconnectInterval=5
ResetOnLogon=N
ResetOnLogout=N
ResetOnDisconnect=N
RefreshOnLogon=Y
ValidateIncomingMessage=Y
