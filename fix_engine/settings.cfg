[DEFAULT]
; TINKOFF или TINKOFF_SANDBOX — один и тот же gRPC-поток (прод-хост в TBankSandboxHost)
DataProvider=TINKOFF
; История котировок (SQLite): окно retention_days, прореживание sample_ms
QuoteHistoryEnabled=Y
QuoteHistoryDbPath=quote_history.db
QuoteHistoryRetentionDays=14
QuoteHistorySampleIntervalMs=1000
ExecutionMode=PAPER_REAL_MARKET
; Исполнение по лучшим bid/ask из стрима (без RNG/модельного slippage). При Y ключи PaperSlippage* и задержки симулятора не используются.
PaperStreamBookFills=Y
; Синтетическое исполнение (если PaperStreamBookFills=N — вероятностная модель ниже)
PaperSlippageBps=2.0
PaperSlippageMaxBps=18.0
PaperVolatilitySlippageMultiplier=1.25
PaperNetworkLatencyMs=15
PaperExchangeLatencyMs=22
PaperLatencyJitterMs=28
PaperFillParticipation=0.32
PaperTouchFillProbability=0.05
PaperPassiveFillProbabilityScale=0.32
PaperAdverseSelectionBias=0.18
PaperSlippageModel=SPREAD_FRACTION
PaperFixedSlippageAbs=0.01
PaperSpreadSlippageFraction=0.12
DecisionToSendLatencyMinMs=5
DecisionToSendLatencyMaxMs=20
SendToFillLatencyMinMs=50
SendToFillLatencyMaxMs=200
FeesBpsEquities=0.00
FeesBpsForts=0.00
FeesFixedEquities=0.00
FeesFixedForts=0.00
RiskMaxExposurePerInstrument=1000000
RiskMaxTradesInWindow=120
RiskTradesWindowSeconds=60
RiskCooldownAfterConsecutiveLosses=4
RiskCooldownSeconds=20
RiskMaxLossPerTrade=12.0
; Virtual account (used to compute stop-loss and trading halt)
VirtualAccountEnabled=Y
VirtualAccountStartBalance=1000.0
VirtualAccountMaxLossFraction=0.0
; Pre-trade forecast gate (block entry if forecast alignment is too low)
; Чтобы сохранить прежнюю логику входа (уже показавшую плюс),
; предикт-фильтр по входам отключен. Выходы контролируются виртуальным стопом.
MMEntryForecastProfitEnabled=N
MMEntryForecastAlignmentMin=0.0
MaxInventoryPerSymbol=1
MaxInventorySoftPerSymbol=1
MarketMakingEnabled=Y
MarketMakingSymbol=SRM6
MarketMakingLotSize=1
MarketMakingMarket=FORTS
MMVolatilityWindowTicks=20
MMMaxShortTermVolatility=0.0
MMCancelOnHighVolatility=Y
MMRestingOrderTimeoutSec=2.0
MMTickSize=1.0
MMReplaceThresholdTicks=2
MMReplaceCancelThresholdTicks=2.0
MMReplaceKeepThresholdTicks=1.0
MMReplacePersistMs=220
MMAdverseMoveCancelTicks=3
MMFastCancelKeepTicks=1.5
MMFastCancelPersistMs=180
MMPriceToleranceTicks=1.5
MMPriceTolerancePct=0.0
MMMinOrderLifetimeMs=200
MMCancelReplaceCooldownMs=120
MMEntryMinSpread=0.8
MMEntryStabilityWindowTicks=8
MMEntryMaxBidAskMoveTicks=2.0
MMEntryAntiTrendThreshold=0.0010
MMEntryDirectionWindowTicks=12
MMEntryDirectionMinMoveTicks=0.5
MMTradeCooldownMs=2500
MMEntryMinPlaceIntervalMs=1200
MMOnePositionOnly=Y
MMReversalEnabled=N
MMReversalConfirmationUpdates=4
MMReversalMinTrendStrength=0.0012
MMReversalMinHoldMs=180000
MMReversalCooldownMs=300000
MMWeeklyTrendEnabled=N
MMWeeklyTrendDays=14
MMWeeklyTrendThresholdPct=0.2
MMWeeklyTrendRefreshSec=30
MMVolumeMoveCorrEnabled=N
MMVolumeMoveCorrLookbackDays=14
MMVolumeMoveCorrBarMinutes=5
MMVolumeMoveCorrMinSamples=500
MMVolumeMoveCorrThreshold=0.02
MMVolumeMoveCorrRefreshSec=60
MMFiveMinEntryGateEnabled=N
MMFiveMinImpulseMinTicks=0.1
MMFiveMinVolumeRatioMin=1.02
MMTrendContinuationEnabled=Y
MMTrendContinuationConfirmUpdates=1
MMTrendContinuationMinMoveTicks=0.25
MMFlowBiasWindowTicks=12
MMLongFlowBiasMin=0.10
MMLongTrendBiasMinTicks=0.25
MMLongImpulseOverrideTicks=1.5
MMShortFlowBiasMax=0.12
MMShortTrendBiasMinTicks=0.00
MMVolumeFlowOverrideTicks=1.50
MMVolumeSpikeEntryEnabled=N
MMVolumeSpikeWindowTicks=24
MMVolumeSpikeMultiplier=1.5
MMVolumeSpikeFlowBiasAbsMin=0.20
MMMomentumExitEnabled=Y
MMIgnoreDuplicateTicksMs=0
MMDecisionMinMidMoveTicks=0.0
MMTrayPriceEverySec=0.0
MMTakeProfitPerTrade=5.0
MMDynamicProfitTargetEnabled=N
MMDynamicProfitTargetVolMultiplier=1.8
MMDynamicProfitTargetMomentumWeight=0.35
MMDynamicProfitTargetFlowWeight=0.60
MMDynamicProfitTargetTrendWeight=0.45
MMDynamicProfitTargetMin=1.5
MMDynamicProfitTargetMax=120.0
MMBreakevenTrailingOffsetTicks=10.0
MMEntryScoreThreshold=0.11
MMEntryScoreSpreadThreshold=0.85
MMEntryScoreWSpread=0.35
MMEntryScoreWStability=0.25
MMEntryScoreWTrend=0.25
MMEntryScoreWImbalance=0.15
MMEntryScoreCooldownPenaltyMax=0.35
MMTrendWindowTicks=12
MMTrendStrengthThreshold=0.0010
MMCancelOnStrongTrend=N
MMPostFillHorizonMs=8000
MMAdverseFillWindow=80
MMAdverseFillRateThreshold=0.90
MMDefensiveQuoteOffsetTicks=2
MMDecisionConfirmationUpdates=1
MMMinDecisionIntervalMs=0
MMDecisionBatchTicks=1
MMCancelImpactHorizonMs=500
MMCancelReasonSummaryEvery=20
MMDisablePriceMoveCancel=N
MMMicropriceEdgeThreshold=0.0
MMSpreadMedianWindowTicks=64
MMAntiAdverseWindowMs=50
MMKpiEvalEveryTrades=50
MMKpiThresholdStep=0.0001
MMPositionPolicyEnabled=N
MMAdaptiveTargetsPath=adaptive_learning_targets.json
MMLearningPatchStatePath=learning_patch_state.json
; Режим стратегии: VOLUME_FOLLOW (объем/дисбаланс, следуем за рынком)
MMStrategyMode=VOLUME_FOLLOW
; Legacy keys (MOMENTUM_BREAKOUT) are ignored/removed from code path.
; Keep them unset to avoid confusion.
MMMomentumExitEnabled=N
FailureHandlingEnabled=Y
FailureWatchSymbol=SRM6
MaxMarketDataStalenessSec=60
MaxOrderStuckSec=30
MaxNoExecutionReportSec=15
FailureAction=ALERT
FailureCheckIntervalSec=1
# gRPC: песочница sandbox-invest-public-api.tinkoff.ru; прод invest-public-api.tinkoff.ru или .tbank.ru (при SSL MITM часто работает только tinkoff.ru)
TBankSandboxHost=invest-public-api.tinkoff.ru:443
TBankSandboxToken=
TBankInstrumentId=755574b5-703f-4a2f-9e1d-137c8cb90850
TBankSymbol=SRM6
TBankOrderBookDepth=1
TBankIncludeTrades=Y
TBankRunDurationSec=0
; backoff при обрыве/завершении gRPC MarketDataStream (сек)
TBankMdReconnectInitialSec=1.0
TBankMdReconnectMaxSec=60.0
; 0 = выкл.; иначе закрыть gRPC-канал если нет ни одного сообщения стрима дольше N сек (зависший sandbox)
TBankMdStaleReconnectSec=25.0
