[DEFAULT]
; TINKOFF / TINKOFF_SANDBOX — gRPC-поток; прод-хост API: invest-public-api.tbank.ru:443 (ключ TBankSandboxHost)
DataProvider=TINKOFF
; MOMENTUM_MM = старый MM по стакану/тикам | SWING_BREAKOUT = только свинг (свечи + пробой/объём/MA)
TradingStrategy=SWING_BREAKOUT
; Свинг: только 5m или 15m; опрос API свечей (сек)
SwingCandleInterval=15m
SwingPollIntervalSec=30
SwingNLevels=20
SwingKVolume=1.5
SwingMAPeriod=50
; TP/SL в рублях на позицию (калибруйте SwingRubPerPoint под ваш фьючерс)
SwingTpRub=200
SwingSlRub=100
SwingRubPerPoint=1.0
SwingSlippageTicks=1
SwingCommissionRate=0.0004
SwingNotionalScale=1.0
SwingTrailingActivationRub=0.0
SwingTrailingGapRub=50.0
; История котировок (SQLite): окно retention_days, прореживание sample_ms
QuoteHistoryEnabled=Y
QuoteHistoryDbPath=quote_history.db
QuoteHistoryRetentionDays=14
QuoteHistorySampleIntervalMs=1000
ExecutionMode=PAPER_REAL_MARKET
; LIVE: реальные заявки T-Invest (нужны TBankSandboxToken в settings.local.cfg, TradingAccountEquities, TBankInstrumentId). Иначе PAPER_REAL_MARKET.
;TradingAccountEquities=
;TradingAccountForts=
; Количество бумаг в одном лоте инструмента (для post_order quantity в лотах)
TBankSharesPerLot=1
; Y = post_sandbox_order / cancel_sandbox_order (песочница счёта); N = продовые orders.*
TBankUseSandboxOrders=N
; Исполнение по лучшим bid/ask из стрима (без RNG/модельного slippage). При Y ключи PaperSlippage* и задержки симулятора не используются.
PaperStreamBookFills=Y
; Синтетическое исполнение (если PaperStreamBookFills=N — вероятностная модель ниже)
PaperSlippageBps=2.0
PaperSlippageMaxBps=18.0
PaperVolatilitySlippageMultiplier=1.25
PaperNetworkLatencyMs=15
PaperExchangeLatencyMs=22
PaperLatencyJitterMs=28
PaperFillParticipation=0.32
PaperTouchFillProbability=0.05
PaperPassiveFillProbabilityScale=0.32
PaperAdverseSelectionBias=0.18
PaperSlippageModel=SPREAD_FRACTION
PaperFixedSlippageAbs=0.01
PaperSpreadSlippageFraction=0.12
DecisionToSendLatencyMinMs=5
DecisionToSendLatencyMaxMs=20
SendToFillLatencyMinMs=50
SendToFillLatencyMaxMs=200
; Комиссии для UnitEconomics / e2e (стратегия MM не использует — PnL в логах стратегии без этих комиссий).
BrokerFeeModelEnabled=Y
; Акции/облигации/ETF базового списка: доля от суммы сделки (1 bp = 0.01%). Подстройте под ваш договор.
FeesBpsEquities=4.0
; Если FeesFortsTiered=N — только плоская ставка FeesBpsForts (bps).
FeesBpsForts=0.00
FeesFixedEquities=0.00
FeesFixedForts=0.00
; Фьючерсы базового списка: ступени по дневному обороту в рублях (МСК), п. 2.1.1–2.1.3 тарифа
FeesFortsTiered=Y
FeesFortsTier1EndRub=12000000
FeesFortsTier2EndRub=17000000
FeesFortsTier1Bps=2.5
FeesFortsTier2Bps=2.0
FeesFortsTier3Bps=1.5
RiskMaxExposurePerInstrument=1000000
RiskMaxTradesInWindow=120
RiskTradesWindowSeconds=60
RiskCooldownAfterConsecutiveLosses=8
RiskCooldownSeconds=5
RiskMaxLossPerTrade=8.0
RiskMaxAbsPositionPerSymbol=1
RiskMaxDailyLossAbs=0.0
RiskKillSwitchDrawdownAbs=0.0
; Virtual account (used to compute stop-loss and trading halt)
VirtualAccountEnabled=Y
VirtualAccountStartBalance=1000.0
VirtualAccountMaxLossFraction=0.0
; Pre-trade forecast gate (block entry if forecast alignment is too low)
; Чтобы сохранить прежнюю логику входа (уже показавшую плюс),
; предикт-фильтр по входам отключен. Выходы контролируются виртуальным стопом.
MaxInventoryPerSymbol=1
MaxInventorySoftPerSymbol=1
lot_size=1
market=FORTS
tick_size=1.0
one_position_only=Y
spread_threshold=1.0
max_spread=5.0
dynamic_spread_enabled=Y
dynamic_spread_window_ticks=200
dynamic_spread_mult=1.5
delta_threshold=7.0
; Make entry more selective (reduce churn)
score_threshold=0.82
w_spread=0.25
w_delta=0.75
penalty_wide_spread=0.25
penalty_low_delta=0.25
PositionSizingEnabled=Y
SizingRiskPerTradeAbs=8.0
SizingStopLossTicks=4.0
SizingMinQty=1.0
SizingMaxQty=1.0
strategy_mode=AGGRESSIVE
no_trade_fallback_minutes=3
fallback_relax_step=0.85
fallback_min_delta=0.0
fallback_min_score=0.10
fallback_max_spread=8.0
metrics_log_every=200
cooldown_ms=1200
; Entry stabilizers (anti-flat / anti-overtrade / kill-zone)
FlatFilterWindowSec=10.0
FlatThresholdPoints=5.0
MaxTradesPerMin=2
EntryCooldownSeconds=30.0
KillZoneN=5
KillZoneStopThreshold=2
KillZonePauseSeconds=180.0
KillZonePause2Sec=60.0
KillZonePause3Sec=120.0
KillZoneConsecutiveOnly=Y
EntrySkipLogThrottleSec=0.5
; Strict entry pattern filters (hardened mode)
StrictEntryEnabled=Y
StrictSpreadMaxTicks=1.0
StrongImbalanceHighMin=0.75
StrongImbalanceMedMin=0.60
StrictDeltaScoreMin=0.80
StrictDeltaScoreMed=0.95
StrictMinTrendTicks=1.00
DeltaSpikeThreshold=300.0
ContinuationTicks=3
ContinuationSmallDrop=25.0
TrendAlignScoreBoost=0.05
; Entry quality filters
min_entry_spread=1.0
; Key fix from last trades: entering at spread=2..3 creates an immediate -2..-3 tick headwind
; (entry at ask, exit at bid). Restrict to tight spread only.
max_entry_spread=2.0
imbalance_threshold=0.2
; Asymmetric entry: LONG needs stronger bid-side book; SHORT slightly stricter than legacy 0.2
imbalance_threshold_long=0.55
imbalance_threshold_short=0.30
min_abs_imbalance=0.12
trend_lookback_ticks=8
; Require stronger confirmed move to overcome spread/slippage.
min_trend_move_ticks=2.0

; Anti-noise: block entries during short-term whipsaw
VolatilityFilterWindowSec=5.0
VolatilityMaxRangePoints=15.0

; Exit logic (prefer TP/SL + trailing; do not exit on score by default)
exit_on_score_enabled=N
exit_threshold=0.0
max_holding_sec=0.0
max_exit_spread=0.0
force_time_exit_enabled=N
force_time_exit_after_sec=0.0
; With spread=1 only, target >=3 ticks to get net positive after paying the spread.
take_profit_ticks=3.0
stop_loss_ticks=2.0
trailing_start_ticks=3.0
trailing_gap_ticks=1.0
exit_imbalance_reversal=0.30
; Signal life after entry: flow_strength = w1*delta_norm + w2*imbalance_norm + w3*trend_norm
flow_w_delta=0.45
flow_w_imbalance=0.35
flow_w_trend=0.20
; flow_decay = flow_strength_now / flow_strength_at_entry
flow_decay_exit_threshold=0.40
flow_decay_hold_threshold=0.80
flow_decay_tp_disable_pnl_ticks=1.0
FailureHandlingEnabled=Y
FailureWatchSymbol=SRM6
MaxMarketDataStalenessSec=60
MaxOrderStuckSec=30
MaxNoExecutionReportSec=15
FailureAction=ALERT
FailureCheckIntervalSec=1
; Прод Invest API (gRPC): invest-public-api.tbank.ru:443
TBankSandboxHost=invest-public-api.tbank.ru:443
; Токен только в settings.local.cfg (не коммитить): TBankSandboxToken=t....
TBankInstrumentId=755574b5-703f-4a2f-9e1d-137c8cb90850
TBankSymbol=SRM6
TBankOrderBookDepth=1
TBankIncludeTrades=Y
TBankRunDurationSec=0
; backoff при обрыве/завершении gRPC MarketDataStream (сек)
TBankMdReconnectInitialSec=1.0
TBankMdReconnectMaxSec=60.0
; 0 = выкл.; иначе закрыть gRPC-канал если нет ни одного сообщения стрима дольше N сек (зависший sandbox)
TBankMdStaleReconnectSec=25.0
