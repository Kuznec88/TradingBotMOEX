[DEFAULT]
# Common QuickFIX settings.
FileStorePath=store
FileLogPath=log
ConnectionType=initiator
StartTime=00:00:00
EndTime=23:59:59
HeartBtInt=30
UseDataDictionary=Y
DataDictionary=FIX44.xml

# Reconnect behavior: QuickFIX will retry automatically.
ReconnectInterval=5
ResetOnLogon=N
ResetOnLogout=N
ResetOnDisconnect=N
RefreshOnLogon=Y
ValidateIncomingMessage=Y
ValidateUserDefinedFields=N
AllowUnknownMsgFields=Y
SIMULATION_MODE=N
SimulationSlippageBps=2.0
SimulationNetworkLatencyMs=20
SimulationExchangeLatencyMs=30
SimulationFillParticipation=0.25
FeesBpsEquities=0.00
FeesBpsForts=0.00
RiskMaxExposurePerInstrument=1000000
RiskMaxTradesInWindow=200
RiskTradesWindowSeconds=60
RiskCooldownAfterConsecutiveLosses=3
RiskCooldownSeconds=30
MaxInventoryPerSymbol=10
MarketMakingEnabled=N
MarketMakingSymbol=SBER
MarketMakingLotSize=1
MarketMakingMarket=EQUITIES
StrategyMinSpreadThreshold=0.01
StrategyMaxVolatilityThreshold=0.02
StrategyVolatilityWindow=20
FailureHandlingEnabled=Y
FailureWatchSymbol=SBER
MaxMarketDataStalenessSec=15
MaxOrderStuckSec=30
MaxNoExecutionReportSec=15
FailureAction=ALERT
FailureCheckIntervalSec=1

